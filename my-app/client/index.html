<!DOCTYPE html>
<html lang="en">
  <head>

    <meta name="description" content="MediQuick+ - Your fastest pharmacy delivery service" />

  </head>
  <body>
    <div id="root">
      <div style="height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center; background: white; font-family: sans-serif;">

          <div style="width: 40px; height: 40px; border: 3px solid #f3f3f3; border-top: 3px solid #2874f0; border-radius: 50%; animation: spin 1s linear infinite;"></div>

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      </style>
